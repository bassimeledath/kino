<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kino — Zoom Parameter Comparison</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    padding: 20px;
  }
  .header {
    text-align: center;
    padding: 10px 0 20px;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 6px;
  }
  .header p {
    font-size: 13px;
    color: #888;
  }
  .controls {
    text-align: center;
    margin-bottom: 20px;
  }
  .controls button {
    background: #2563eb;
    color: #fff;
    border: none;
    padding: 10px 32px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .controls button:hover { background: #1d4ed8; }
  .controls button:disabled { background: #333; cursor: default; }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    max-width: 1500px;
    margin: 0 auto;
  }
  .cell {
    background: #111;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid #222;
  }
  .cell-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    background: #161616;
    border-bottom: 1px solid #222;
  }
  .cell-header .label {
    font-size: 13px;
    font-weight: 600;
    color: #fff;
  }
  .badges {
    display: flex;
    gap: 6px;
  }
  .badge {
    font-size: 11px;
    padding: 2px 7px;
    border-radius: 4px;
    font-weight: 600;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }
  .badge-zoom {
    background: #1e3a5f;
    color: #60a5fa;
  }
  .badge-state {
    background: #1a1a2e;
    color: #888;
    min-width: 70px;
    text-align: center;
  }
  .badge-state.ZOOM_IN { background: #1e3a2e; color: #4ade80; }
  .badge-state.HOLD { background: #3a3a1e; color: #facc15; }
  .badge-state.ZOOM_OUT { background: #3a1e1e; color: #f87171; }
  .canvas-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
  }
  .canvas-wrap canvas {
    display: block;
    width: 100%;
    height: 100%;
  }
  .params {
    padding: 8px 12px;
    font-size: 11px;
    color: #666;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    border-top: 1px solid #1a1a1a;
  }
  .params span { white-space: nowrap; }
  .params .key { color: #555; }
  .params .val { color: #999; font-family: 'SF Mono', monospace; }
  video { display: none; }
  .cell-play {
    background: rgba(37,99,235,0.85);
    color: #fff;
    border: none;
    padding: 3px 12px;
    border-radius: 5px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    margin-left: 8px;
  }
  .cell-play:hover { background: rgba(29,78,216,0.95); }
  .cell-play.active { background: rgba(239,68,68,0.85); }
  .cell-play.active:hover { background: rgba(220,38,38,0.95); }
</style>
</head>
<body>

<div class="header">
  <h1>Zoom Parameter Comparison</h1>
  <p>Click Play on any variation to see how it handles your cursor movement. Play multiple to compare side by side.</p>
</div>

<div class="controls">
  <button id="playAllBtn" disabled>Play All</button>
  <button id="stopAllBtn" style="margin-left:8px;background:#ef4444" disabled>Stop All</button>
</div>

<div class="grid" id="grid"></div>

<!-- Individual videos created per cell in JS -->

<script>
// --- SpringCamera (port from spring-camera.ts) ---
class SpringCamera {
  constructor(stiffness = 120, damping = 12) {
    this.stiffness = stiffness;
    this.damping = damping;
    this.x = 0; this.y = 0; this.zoom = 1.0;
    this.vx = 0; this.vy = 0; this.vZoom = 0;
  }
  reset() {
    this.x = 0; this.y = 0; this.zoom = 1;
    this.vx = 0; this.vy = 0; this.vZoom = 0;
  }
  update(tx, ty, tz, dt) {
    const ax = this.stiffness * (tx - this.x) - this.damping * this.vx;
    const ay = this.stiffness * (ty - this.y) - this.damping * this.vy;
    this.vx += ax * dt;
    this.vy += ay * dt;
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    const az = this.stiffness * (tz - this.zoom) - this.damping * this.vZoom;
    this.vZoom += az * dt;
    this.zoom += this.vZoom * dt;
  }
}

// --- ZoomController (port from zoom-controller.ts, parameterized) ---
class ZoomController {
  constructor(dwellThreshold, speedThreshold, cooldownMs) {
    this.dwellThreshold = dwellThreshold;
    this.speedThreshold = speedThreshold;
    this.cooldownMs = cooldownMs;
    this.dwellMs = 0;
    this.zoomCooldownMs = 0;
    this.state = 'IDLE';
  }
  update(input) {
    const { autoZoomLevel, speed, dtMs, currentZoom } = input;
    if (speed > this.speedThreshold) {
      this.dwellMs = 0;
      this.zoomCooldownMs = this.cooldownMs;
    } else {
      this.dwellMs += dtMs;
    }
    if (this.dwellMs > this.dwellThreshold) {
      this.setState('ZOOM_IN');
      return autoZoomLevel;
    }
    if (this.zoomCooldownMs > 0) {
      this.zoomCooldownMs -= dtMs;
      this.setState('HOLD');
      return currentZoom;
    }
    this.setState('ZOOM_OUT');
    return 1;
  }
  setState(next) {
    this.state = next;
  }
}

// --- Variations ---
const VARIATIONS = [
  { name: 'A  Gentle Cinematic',  dwell: 600,  speedTh: 40, cooldown: 500, stiffness: 30,  damping: 8  },
  { name: 'B  Screen Studio-ish', dwell: 800,  speedTh: 50, cooldown: 400, stiffness: 40,  damping: 10 },
  { name: 'C  Ultra Slow',        dwell: 1200, speedTh: 60, cooldown: 600, stiffness: 20,  damping: 6  },
  { name: 'D  Current (Snappy)',   dwell: 400,  speedTh: 30, cooldown: 300, stiffness: 120, damping: 12 },
  { name: 'E  Smooth Damped',     dwell: 800,  speedTh: 45, cooldown: 500, stiffness: 35,  damping: 14 },
  { name: 'F  Quick but Smooth',  dwell: 500,  speedTh: 35, cooldown: 350, stiffness: 50,  damping: 10 },
];

const AUTO_ZOOM_LEVEL = 2.0;
const CANVAS_W = 640;
const CANVAS_H = 360;

// --- State ---
let cursorLog = null;
let maxX = 1, maxY = 1;
const playAllBtn = document.getElementById('playAllBtn');
const stopAllBtn = document.getElementById('stopAllBtn');
const grid = document.getElementById('grid');
const cells = [];

// --- Build grid (each cell gets its own video) ---
VARIATIONS.forEach((v, i) => {
  const cell = document.createElement('div');
  cell.className = 'cell';

  const header = document.createElement('div');
  header.className = 'cell-header';

  const label = document.createElement('span');
  label.className = 'label';
  label.textContent = v.name;

  const rightSide = document.createElement('div');
  rightSide.className = 'badges';

  const cellPlayBtn = document.createElement('button');
  cellPlayBtn.className = 'cell-play';
  cellPlayBtn.textContent = 'Play';

  const zoomBadge = document.createElement('span');
  zoomBadge.className = 'badge badge-zoom';
  zoomBadge.textContent = '1.0x';

  const stateBadge = document.createElement('span');
  stateBadge.className = 'badge badge-state';
  stateBadge.textContent = 'IDLE';

  rightSide.appendChild(cellPlayBtn);
  rightSide.appendChild(zoomBadge);
  rightSide.appendChild(stateBadge);
  header.appendChild(label);
  header.appendChild(rightSide);

  const wrap = document.createElement('div');
  wrap.className = 'canvas-wrap';
  const canvas = document.createElement('canvas');
  canvas.width = CANVAS_W;
  canvas.height = CANVAS_H;
  wrap.appendChild(canvas);

  const vid = document.createElement('video');
  vid.preload = 'auto';
  vid.muted = true;
  vid.playsInline = true;
  vid.src = 'kino-demo.mp4';
  vid.style.display = 'none';
  cell.appendChild(vid);

  const params = document.createElement('div');
  params.className = 'params';
  params.innerHTML =
    `<span><span class="key">dwell</span> <span class="val">${v.dwell}ms</span></span>` +
    `<span><span class="key">speed</span> <span class="val">${v.speedTh}</span></span>` +
    `<span><span class="key">cool</span> <span class="val">${v.cooldown}ms</span></span>` +
    `<span><span class="key">stiff</span> <span class="val">${v.stiffness}</span></span>` +
    `<span><span class="key">damp</span> <span class="val">${v.damping}</span></span>`;

  cell.appendChild(header);
  cell.appendChild(wrap);
  cell.appendChild(params);
  grid.appendChild(cell);

  const cellData = {
    canvas, ctx: canvas.getContext('2d'),
    camera: new SpringCamera(v.stiffness, v.damping),
    zoomCtrl: new ZoomController(v.dwell, v.speedTh, v.cooldown),
    zoomBadge, stateBadge, playBtn: cellPlayBtn,
    video: vid, playing: false, lastTime: 0,
  };
  cells.push(cellData);
});

// --- Load cursor log ---
fetch('cursor-log.json')
  .then(r => r.json())
  .then(log => {
    cursorLog = log;
    maxX = Math.max(...log.map(e => e.x));
    maxY = Math.max(...log.map(e => e.y));
    for (let i = 0; i < log.length; i++) {
      log[i].nx = log[i].x / maxX;
      log[i].ny = log[i].y / maxY;
      if (i === 0) { log[i].speed = 0; continue; }
      const dx = log[i].x - log[i - 1].x;
      const dy = log[i].y - log[i - 1].y;
      const dtSec = (log[i].t - log[i - 1].t) / 1000;
      log[i].speed = dtSec > 0 ? Math.sqrt(dx * dx + dy * dy) / dtSec : 0;
    }
    enableButtons();
  });

function enableButtons() {
  playAllBtn.disabled = false;
  stopAllBtn.disabled = false;
  cells.forEach(c => { c.playBtn.disabled = false; });
}

// --- Per-cell play/stop ---
function startCell(c) {
  if (c.playing) return;
  c.camera.reset();
  c.zoomCtrl.dwellMs = 0;
  c.zoomCtrl.zoomCooldownMs = 0;
  c.zoomCtrl.state = 'IDLE';
  c.video.currentTime = 0;
  c.video.play();
  c.playing = true;
  c.lastTime = 0;
  c.playBtn.textContent = 'Stop';
  c.playBtn.classList.add('active');
}

function stopCell(c) {
  c.video.pause();
  c.playing = false;
  c.playBtn.textContent = 'Play';
  c.playBtn.classList.remove('active');
}

cells.forEach(c => {
  c.playBtn.addEventListener('click', () => {
    if (c.playing) stopCell(c);
    else startCell(c);
  });
  c.video.addEventListener('ended', () => stopCell(c));
});

// --- Play All / Stop All ---
playAllBtn.addEventListener('click', () => cells.forEach(startCell));
stopAllBtn.addEventListener('click', () => cells.forEach(stopCell));

// --- Binary search for closest log entry by time ---
function findEntry(log, timeMs) {
  let lo = 0, hi = log.length - 1;
  while (lo < hi) {
    const mid = (lo + hi) >> 1;
    if (log[mid].t < timeMs) lo = mid + 1;
    else hi = mid;
  }
  if (lo > 0 && Math.abs(log[lo - 1].t - timeMs) < Math.abs(log[lo].t - timeMs)) return lo - 1;
  return lo;
}

// --- Render loop (always running, only updates playing cells) ---
let lastFrameTime = 0;
function tick(timestamp) {
  if (lastFrameTime === 0) lastFrameTime = timestamp;
  const frameDt = Math.min((timestamp - lastFrameTime) / 1000, 0.05);
  lastFrameTime = timestamp;
  const frameDtMs = frameDt * 1000;

  for (const c of cells) {
    if (!c.playing) continue;

    const videoTimeMs = c.video.currentTime * 1000;
    const entryIdx = findEntry(cursorLog, videoTimeMs);
    const entry = cursorLog[entryIdx];
    const speed = entry.speed;

    const targetZoom = c.zoomCtrl.update({
      autoZoomLevel: AUTO_ZOOM_LEVEL,
      speed, dtMs: frameDtMs,
      currentZoom: c.camera.zoom,
    });

    const tx = (entry.nx - 0.5) * CANVAS_W;
    const ty = (entry.ny - 0.5) * CANVAS_H;
    c.camera.update(tx, ty, targetZoom, frameDt);

    const ctx = c.ctx;
    const cam = c.camera;

    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

    if (c.video.readyState >= 2) {
      ctx.save();
      ctx.translate(CANVAS_W / 2, CANVAS_H / 2);
      ctx.scale(cam.zoom, cam.zoom);
      ctx.translate(-CANVAS_W / 2 - cam.x, -CANVAS_H / 2 - cam.y);
      ctx.drawImage(c.video, 0, 0, CANVAS_W, CANVAS_H);
      ctx.restore();
    }

    const dotX = CANVAS_W / 2 + cam.zoom * (entry.nx * CANVAS_W - CANVAS_W / 2 - cam.x);
    const dotY = CANVAS_H / 2 + cam.zoom * (entry.ny * CANVAS_H - CANVAS_H / 2 - cam.y);
    ctx.beginPath();
    ctx.arc(dotX, dotY, 5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = 4;
    ctx.fill();
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;

    c.zoomBadge.textContent = cam.zoom.toFixed(1) + 'x';
    c.stateBadge.textContent = c.zoomCtrl.state;
    c.stateBadge.className = 'badge badge-state ' + c.zoomCtrl.state;
  }

  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);
</script>
</body>
</html>
